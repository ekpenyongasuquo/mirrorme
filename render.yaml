services:
  - type: web
    name: mirrorme-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOUCAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false